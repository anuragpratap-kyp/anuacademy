<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Anurag Academy{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <nav class="navbar">
        <a href="/" class="logo" aria-label="Anurag Academy Home">
            <span class="logo-mark">AA</span>
            <span class="logo-text">
                <span class="logo-main">Anurag</span>
                <span class="logo-sub">Academy</span>
            </span>
        </a>
        <button class="nav-toggle" type="button" aria-label="Open navigation menu" aria-expanded="false" aria-controls="primaryNav">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <ul class="nav-links" id="primaryNav">
            <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">Home</a></li>
            <li><a href="/semesters" class="{% if request.path.startswith('/semesters') %}active{% endif %}">Semesters</a></li>
            <li><a href="/dashboard" class="{% if request.path.startswith('/dashboard') %}active{% endif %}">Dashboard</a></li>
            <li><a href="/about" class="{% if request.path.startswith('/about') %}active{% endif %}">About</a></li>
            <li><a href="/contact" class="{% if request.path.startswith('/contact') %}active{% endif %}">Contact</a></li>
        </ul>
    </nav>
    <div class="nav-backdrop" aria-hidden="true"></div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; 2026 Anurag Academy | All Rights Reserved
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
