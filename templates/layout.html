<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Anurag Academy{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <nav class="navbar">
        <a href="/" class="logo" aria-label="Anurag Academy Home">
            <span class="logo-mark">AA</span>
            <span class="logo-text">
                <span class="logo-main">Anurag</span>
                <span class="logo-sub">Academy</span>
            </span>
        </a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/semesters">Semesters</a></li>
            <li><a href="/dashboard">Dashboard</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    &copy; 2026 Anurag Academy | All Rights Reserved
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</html>
